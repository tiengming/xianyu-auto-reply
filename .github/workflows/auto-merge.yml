name: Auto Merge Main to Build Branch

on:
  schedule:
    # 每天北京时间上午 8:00 自动运行一次 (UTC 时间 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你随时在 GitHub 页面上手动点击按钮运行

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，Action 才能把合并后的代码 push 回去

    steps:
      - name: Checkout custom branch
        uses: actions/checkout@v4
        with:
          ref: build-exe-fix # 强制检出你的自定义分支
          fetch-depth: 0     # 必须获取完整的 Git 历史，否则无法进行 merge 操作

      - name: Set up Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Merge Main
        run: |
          # 1. 拉取远程最新的 main 分支
          git fetch origin main
          
          # 2. 将 main 合并到当前分支 (build-exe-fix)
          # --no-edit 表示使用 Git 默认生成的合并日志，无需人工确认
          git merge origin/main --no-edit

      - name: Push changes
        run: |
          # 3. 将合并后的代码安全地推送回远程的 build-exe-fix 分支
          git push origin build-exe-fix
